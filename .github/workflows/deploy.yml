# Docker 워크플로(CI) 성공 후에만 배포 트리거 — 빌드 실패 시 배포 차단
name: Deploy

on:
  workflow_run:
    # Depends on: .github/workflows/docker.yml (name: "Docker")
    workflows: ["Docker"]
    types: [completed]

permissions: {}  # 워크플로 전체 기본 권한 차단, job별 최소 권한 선언

jobs:
  deploy:
    runs-on: self-hosted
    timeout-minutes: 10
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read  # checkout 전용, 그 외 권한 불필요

    env:
      AAA_INFRA_DIR: ${{ vars.AAA_INFRA_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      # analyzer는 DDL이 없음(ADR-016, B4 확정) — collector의 Flyway 마이그레이션
      # 체크·조건부 롤백 분기가 불필요하다. 실패 시 무조건 이전 digest로 롤백한다.

      - name: Save current image digest
        id: prev
        run: |
          PREV_DIGEST=$(docker inspect analyzer --format='{{index .RepoDigests 0}}' 2>/dev/null || echo "")
          echo "prev_digest=$PREV_DIGEST" >> $GITHUB_OUTPUT

      - name: Pull latest image
        run: docker compose --project-directory "$AAA_INFRA_DIR" pull analyzer

      - name: Deploy analyzer
        # 컨테이너 healthcheck(내부 /health) 통과까지 대기. healthcheck 정의는 aaa-infra
        # compose 측 반영 사항(analyzer는 포트 미노출 서비스, TECHSPEC 10.3).
        run: docker compose --project-directory "$AAA_INFRA_DIR" up -d --wait --wait-timeout 180 analyzer

      - name: Prune dangling images
        # 배포 성공 시에만 직전 latest 이미지(dangling) 정리. 롤백은 GHCR에서 다이제스트로 재-pull하므로 로컬 캐시와 무관.
        if: success()
        run: docker image prune -f

      - name: Rollback on failure
        id: rollback
        # analyzer는 마이그레이션이 없으므로(ADR-016) 실패 시 무조건 롤백한다(B4).
        if: failure() && steps.prev.outputs.prev_digest != ''
        env:
          PREV_DIGEST: ${{ steps.prev.outputs.prev_digest }}
        run: |
          echo "Rolling back to $PREV_DIGEST..."
          docker pull "$PREV_DIGEST"
          ANALYZER_IMAGE="$PREV_DIGEST" \
            docker compose --project-directory "$AAA_INFRA_DIR" up -d --wait --wait-timeout 180 analyzer
          echo "Rollback complete."

      - name: Notify on failure
        if: always() && (failure() || steps.rollback.outcome != 'skipped')
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_SYSTEM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_OPERATOR_CHAT_ID }}
          ROLLBACK_OUTCOME: ${{ steps.rollback.outcome }}
          PREV_DIGEST: ${{ steps.prev.outputs.prev_digest }}
          SHA: ${{ github.event.workflow_run.head_sha }}
          BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          echo "::add-mask::$BOT_TOKEN"
          echo "::add-mask::$CHAT_ID"
          set +x
          NL=$'\n'
          SHORT_SHA="${SHA:0:7}"
          if [ "$ROLLBACK_OUTCOME" = "success" ]; then
            SHORT_DIGEST="${PREV_DIGEST##*@}"
            SHORT_DIGEST="${SHORT_DIGEST:0:15}"
            TEXT="⚠️ <b>[점검] aaa-analyzer 배포 실패 — 자동 롤백 완료</b>${NL}상태: 새 이미지 배포 실패 후 이전 이미지(${SHORT_DIGEST})로 자동 복구됨. 브랜치 ${BRANCH}, 커밋 ${SHORT_SHA}.${NL}확인: 배포 실패 원인(빌드·헬스체크) 로그 확인 후 재배포"
          else
            TEXT="🚨 <b>[긴급] aaa-analyzer 배포 실패 — 자동 롤백도 실패</b>${NL}상태: 새 이미지 배포와 이전 이미지 복구 모두 실패 — 서비스 다운 가능성. 브랜치 ${BRANCH}, 커밋 ${SHORT_SHA}.${NL}확인: NAS SSH 접속 → \"docker ps -a | grep analyzer\"로 컨테이너 상태 즉시 확인, 수동 개입 필요"
          fi
          printf 'url = "https://api.telegram.org/bot%s/sendMessage"\n' "$BOT_TOKEN" \
            | curl -sf -K - \
              --data-urlencode "chat_id=${CHAT_ID}" \
              --data-urlencode "parse_mode=HTML" \
              --data-urlencode "text=${TEXT}"
