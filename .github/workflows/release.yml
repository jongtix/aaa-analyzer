name: Release

on:
  push:
    branches:
      - main

permissions: {}  # 워크플로 전체 기본 권한 차단, job별 최소 권한 선언

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dependencies (locked)
        # uv.lock 불일치 시 실패 (REQ-ANALYZER-FOUNDATION-024)
        run: uv sync --locked

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Pyright
        run: uv run pyright

      - name: Pytest (full suite + coverage gate)
        # 통합 포함 전체 실행. --cov-fail-under=85는 pyproject.toml addopts에 배선됨
        # (REQ-ANALYZER-FOUNDATION-025).
        run: uv run pytest

  release:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      # python-semantic-release: pyproject.toml [project.version]을 네이티브로 갱신
      # (node @semantic-release/exec + sed 우회 불요). commit_parser="emoji" 내장 파서
      # 사용, collector .releaserc.js와 동일한 gitmoji+conventional 매핑을
      # [tool.semantic_release.commit_parser_options]로 재현(✨→minor, 🐛/⚡→patch).
      - name: Python Semantic Release
        uses: python-semantic-release/python-semantic-release@v10.6.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          git_committer_name: "github-actions[bot]"
          git_committer_email: "github-actions[bot]@users.noreply.github.com"
